<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RQBT Advance Signals Bot Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0e1621;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #17212b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 {
            text-align: center;
            color: #2481cc;
            margin-bottom: 30px;
            border-bottom: 2px solid #2481cc;
            padding-bottom: 10px;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
        .card {
            background: #202b36;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #2f3e4c;
            position: relative;
        }
        label { display: block; margin: 10px 0 5px; font-weight: bold; }
        select, input, textarea, button {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #2f3e4c;
            background: #17212b;
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            background: #2481cc;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }
        button:hover { background: #2996e6; }
        .copy-btn {
            background: #e67e22;
            margin-bottom: 10px;
            font-size: 0.9rem;
            padding: 8px;
        }
        .copy-btn:hover { background: #d35400; }
        .output-box {
            background: #111922;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #2481cc;
            white-space: pre-wrap;
            font-family: monospace;
            max-height: 450px;
            overflow-y: auto;
            color: #00ffcc;
        }
        #lockScreen {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: #0e1621;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .lock-box {
            background: #17212b;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        /* Custom Toast Notification Style */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2ecc71;
            color: white;
            padding: 12px 25px;
            border-radius: 6px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: none;
            z-index: 10000;
        }
    </style>
</head>
<body>

<!-- 📝 TOAST ALERT FOR COPY -->
<div id="toastAlert" class="toast">📋 List copied to clipboard!</div>

<!-- 🔒 LICENSE LOCK SCREEN -->
<div id="lockScreen">
    <div class="lock-box">
        <h2>🔑 License Required</h2>
        <p>Please enter your valid license key to access the dashboard.</p>
        <input type="text" id="licenseInput" placeholder="Enter License Key Here...">
        <button onclick="verifyLicense()">Activate Bot</button>
        <p id="lockError" style="color: #ff4d4d; margin-top: 10px; font-weight: bold;"></p>
    </div>
</div>

<!-- 🎯 MAIN DASHBOARD CONTENT -->
<div class="container" id="mainContent" style="display: none;">
    <h1>🎯 RQBT Signals Engine</h1>
    <div class="grid">
        <div class="card">
            <h2>📦 RQBT Custom Generator</h2>
            <label for="pairSelect">Select Asset/Pair:</label>
            <select id="pairSelect">
                <option value="MIXED">🌀 MIXED LIVE PAIRS</option>
                <option value="EURUSD">EURUSD</option>
                <option value="GBPUSD">GBPUSD</option>
                <option value="USDJPY">USDJPY</option>
                <option value="USDCHF">USDCHF</option>
                <option value="CHFJPY">CHFJPY</option>
                <option value="EURGBP">EURGBP</option>
                <option value="AUDUSD">AUDUSD</option>
                <option value="USDCAD">USDCAD</option>
            </select>
            <label for="tradeCount">Number of Trades:</label>
            <input type="number" id="tradeCount" value="10" min="1" max="50">
            <button onclick="generateSignals()">⚡ Generate RQBT Template List</button>
            
            <div style="margin-top: 15px;">
                <button onclick="copyToClipboard()" class="copy-btn">📋 Copy Full List</button>
                <div id="genOutput" class="output-box">Signals copy karne ke liye generate karein...</div>
            </div>
        </div>
        <div class="card">
            <h2>📋 RQBT Smart Result Checker</h2>
            <label for="listInput">Paste Generated List Here:</label>
            <textarea id="listInput" placeholder="09:00 EURUSD ➪ PUT" style="height: 120px;"></textarea>
            <button onclick="checkResultsWithEmulation()" style="background: #28a745;">🔍 Evaluate Smart Accuracy</button>
            <h3>📊 Accuracy Report:</h3>
            <div id="checkOutput" class="output-box" style="color: #ffcc00;">List paste karke evaluate karein...</div>
        </div>
    </div>
</div>

<script>
    async function verifyLicense() {
        const key = document.getElementById('licenseInput').value.trim();
        const errorDiv = document.getElementById('lockError');
        
        if(!key) {
            errorDiv.innerText = "Please enter a key!";
            return;
        }

        try {
            const response = await fetch('/api/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ licenseKey: key })
            });

            const data = await response.json();

            if (data.success) {
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                sessionStorage.setItem('bot_authenticated', 'true');
            } else {
                errorDiv.innerText = data.message || "Invalid Key!";
            }
        } catch (err) {
            errorDiv.innerText = "Connection error! Try again.";
        }
    }

    if(sessionStorage.getItem('bot_authenticated') === 'true') {
        document.getElementById('lockScreen').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
    }

    // --- 🤖 GENERATOR & EXACT RQBT FORMATTING LOGIC ---
    const pairsArray = ["EURUSD", "GBPUSD", "USDJPY", "USDCHF", "CHFJPY", "EURGBP", "AUDUSD", "USDCAD"];
    let currentGeneratedList = ""; // Store for easy copy

    function generateSignals() {
        const selected = document.getElementById('pairSelect').value;
        const count = parseInt(document.getElementById('tradeCount').value) || 10;
        
        let now = new Date();
        let dd = String(now.getDate()).padStart(2, '0');
        let mm = String(now.getMonth() + 1).padStart(2, '0');
        let yyyy = now.getFullYear();
        let formattedDate = `${dd}.${mm}.${yyyy}`;

        let header = `🎇${formattedDate}\n\n📈 RQBT Traders\n\n🏦 Broker: Quotex\n⏰UTC +5:00(Pakistan)🇵🇰\n\n➡️ 1 STEP MTG\n⏱️ 1M\n\n`;
        let body = "";
        
        now.setMinutes(now.getMinutes() + 5);

        for (let i = 0; i < count; i++) {
            let currentPair = selected === "MIXED" ? pairsArray[i % pairsArray.length] : selected;
            let timeStr = String(now.getHours()).padStart(2, '0') + ":" + String(now.getMinutes()).padStart(2, '0');
            let direction = Math.random() > 0.48 ? "CALL" : "PUT";
            
            body += `${timeStr} ${currentPair} ➪ ${direction}\n`;
            now.setMinutes(now.getMinutes() + 5);
        }

        let footer = `\n🚨 RQBT Software Rules for Better Accuracy 🚨\n\n` +
                     `📌 RULE NO 1: ❌ Avoid trading after a Doji candle\n` +
                     `📌 RULE NO 2: ❌ Avoid trading after a big candle\n` +
                     `📌 RULE NO 3: 📉 Avoid trading against the trend\n` +
                     `📌 RULE NO 4: 🛡️ Always use a safety margin\n` +
                     `📌 RULE NO 5: ⚠️ Avoid big gap up/down markets\n` +
                     `📌 RULE NO 6: 💰 Avoid trades if payout is below 80%\n` +
                     `📌 RULE NO 7: 🎯 If TP (Take Profit) is hit → STOP trading\n\n` +
                     `📝 Important Notes:\n` +
                     `✔️ Risk management is mandatory 📊\n` +
                     `✔️ No rule = No trade 🚫\n` +
                     `✔️ Always follow proper money management 💸\n\n` +
                     `Build by RiZii Advance Signals`;

        currentGeneratedList = header + body + footer;
        document.getElementById('genOutput').innerText = currentGeneratedList;
    }

    // 📋 Dedicated Copy Function
    function copyToClipboard() {
        if (!currentGeneratedList || currentGeneratedList.startsWith("Signals copy karne")) {
            alert("Pehle signals generate karein!");
            return;
        }
        
        navigator.clipboard.writeText(currentGeneratedList).then(() => {
            const toast = document.getElementById('toastAlert');
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 2500);
        }).catch(err => {
            // Fallback for older browsers
            const el = document.createElement('textarea');
            el.value = currentGeneratedList;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            const toast = document.getElementById('toastAlert');
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 2500);
        });
    }

    function getSeededResult(pair, timeStr) {
        let seed = 0; let combinedStr = pair + timeStr;
        for (let i = 0; i < combinedStr.length; i++) { seed += combinedStr.charCodeAt(i); }
        let x = Math.sin(seed) * 10000; let finalRoll = x - Math.floor(x);
        if (finalRoll < 0.62) return "🟢 DIRECT WIN";
        else if (finalRoll < 0.84) return "🍏 1st MTG WIN";
        else if (finalRoll < 0.88) return "🔄 Doji (REFUND)";
        else return "🔴 LOSS";
    }

    function checkResultsWithEmulation() {
        const input = document.getElementById('listInput').value;
        const lines = input.split('\n');
        const outputDiv = document.getElementById('checkOutput');
        let report = "📊 **RQBT Accuracy Evaluation Report**\n=================================\n\n";
        
        let pattern = /(\d{2}:\d{2})\s*([A-Z\/_]+)\s*➪\s*(CALL|PUT)/i;
        
        lines.forEach(line => {
            let match = pattern.exec(line);
            if (match) {
                let timeVal = match[1].trim();
                let pair = match[2].toUpperCase().trim();
                let direction = match[3].toUpperCase().trim();
                let result = getSeededResult(pair, timeVal);
                report += `🔹 ${timeVal} ${pair} ➪ ${direction} ➜ ${result}\n`;
            }
        });
        report += "\n=================================\n🔥 Evaluation Matrix Finished Successfully.";
        outputDiv.innerText = report;
    }
</script>
</body>
</html>
